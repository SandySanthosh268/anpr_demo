version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: anpr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: anpr_db
      POSTGRES_USER: anpr_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anpr_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anpr_user -d anpr_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anpr_net

  # ── API (FastAPI + ANPR Pipeline) ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: anpr_api
    restart: unless-stopped
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://anpr_user:${POSTGRES_PASSWORD:-anpr_pass}@postgres:5432/anpr_db
      RTSP_URL: ${RTSP_URL}
      CAMERA_NAME: ${CAMERA_NAME:-Gate1}
      FRAME_SKIP: ${FRAME_SKIP:-5}
      YOLO_MODEL_PATH: /app/models/yolov8_license_plate.pt
      DETECTION_DEVICE: ${DETECTION_DEVICE:-cpu}
      SNAPSHOT_DIR: /app/snapshots
      CORS_ORIGINS: '["http://localhost","http://frontend"]'
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production}
    volumes:
      - snapshots:/app/snapshots
      - ./models:/app/models:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - anpr_net

  # ── Alembic migrations (one-shot) ───────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: anpr_migrate
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://anpr_user:${POSTGRES_PASSWORD:-anpr_pass}@postgres:5432/anpr_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - anpr_net
    restart: "no"

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: anpr_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - anpr_net

volumes:
  postgres_data:
  snapshots:

networks:
  anpr_net:
    driver: bridge
